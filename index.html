<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3D5247">
<title>Receptúra — Krémműhely</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

:root{
  --paper:#F1F0E7; --paper-2:#FBFAF4; --card:#FFFFFF;
  --ink:#232A20; --ink-soft:#5C6356;
  --line:#DEDCCD; --line-2:#E9E7DA;
  --green:#3D5247; --green-d:#2C3C33; --sage:#E5E9DD;
  --honey:#BC7C36; --honey-d:#A1692A;
  --clay:#AE4E39; --clay-bg:#F6E5DF;
  --radius:12px; --radius-s:9px;
  --shadow:0 1px 2px rgba(35,42,32,.05), 0 10px 28px -16px rgba(35,42,32,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.5}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(60,76,63,.025) 1px, transparent 1px);background-size:22px 22px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:1rem}
input,select,textarea{font-family:inherit;font-size:1rem;color:var(--ink)}
h1,h2,h3{font-family:'Fraunces',Georgia,serif;font-weight:600;line-height:1.15;letter-spacing:-.01em}

.app{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:0 18px 120px}
.topbar{display:flex;align-items:center;gap:14px;padding:22px 2px 18px}
.mark{flex:0 0 auto;width:46px;height:46px;border-radius:12px;background:var(--green);
  display:grid;place-items:center;box-shadow:var(--shadow)}
.mark svg{width:28px;height:28px}
.brand h1{font-size:1.5rem;color:var(--green-d);letter-spacing:-.02em}
.brand .tag{font-size:.82rem;color:var(--ink-soft);letter-spacing:.04em;text-transform:uppercase}
.langtog{margin-left:auto;display:flex;gap:3px;background:var(--paper-2);border:1px solid var(--line);
  border-radius:10px;padding:3px;box-shadow:var(--shadow)}
.langtog button{padding:7px 13px;border-radius:7px;font-weight:700;font-size:.82rem;color:var(--ink-soft);letter-spacing:.03em;transition:.15s}
.langtog button.active{background:var(--green);color:#fff}

.nav{display:flex;gap:6px;background:var(--paper-2);border:1px solid var(--line);
  border-radius:14px;padding:5px;margin-bottom:20px;box-shadow:var(--shadow)}
.nav button{flex:1;padding:11px 8px;border-radius:10px;font-weight:600;color:var(--ink-soft);
  font-size:.96rem;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.nav button .ic{width:18px;height:18px;opacity:.8}
.nav button.active{background:var(--green);color:#fff;box-shadow:0 4px 12px -4px rgba(44,60,51,.5)}
.nav button.active .ic{opacity:1}

.stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.stat{flex:1;min-width:130px;background:var(--paper-2);border:1px solid var(--line);
  border-radius:var(--radius);padding:13px 16px}
.stat .n{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:600;color:var(--green-d);line-height:1}
.stat .l{font-size:.8rem;color:var(--ink-soft);margin-top:4px}
.stat.warn .n{color:var(--clay)}

.shead{display:flex;align-items:center;gap:12px;margin:4px 0 16px}
.shead h2{font-size:1.25rem;color:var(--green-d);flex:0 0 auto}
.shead .search{flex:1;max-width:280px;margin-left:auto;position:relative}
.shead .search input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--line);
  border-radius:10px;background:var(--paper-2)}
.shead .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-soft)}

.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 16px;border-radius:10px;
  font-weight:600;font-size:.95rem;transition:.15s;white-space:nowrap}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--honey);color:#fff;box-shadow:0 4px 12px -5px rgba(161,105,42,.6)}
.btn-primary:hover{background:var(--honey-d)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:var(--green-d)}
.btn-ghost{background:var(--paper-2);border:1px solid var(--line);color:var(--ink)}
.btn-ghost:hover{border-color:var(--green);color:var(--green-d)}
.btn-danger{background:var(--clay-bg);color:var(--clay)}
.btn-danger:hover{background:#efd7cf}
.btn-block{width:100%;justify-content:center}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.rcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.rcard:hover{transform:translateY(-2px);border-color:var(--green)}
.rcard::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--green),var(--honey))}
.rcard .sprig{position:absolute;right:-6px;bottom:-8px;width:74px;height:74px;opacity:.08;color:var(--green)}
.rcard h3{font-size:1.25rem;color:var(--green-d);margin-bottom:6px;padding-right:30px}
.rcard .yield{display:inline-flex;align-items:center;gap:5px;font-size:.82rem;color:var(--honey-d);
  background:#F6ECDB;padding:3px 9px;border-radius:20px;font-weight:600;margin-bottom:10px}
.rcard .meta{font-size:.86rem;color:var(--ink-soft);display:flex;gap:14px;flex-wrap:wrap}
.rcard .meta b{color:var(--ink);font-weight:600}

.ilist{display:flex;flex-direction:column;gap:8px}
.irow{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius-s);padding:13px 16px;box-shadow:0 1px 2px rgba(35,42,32,.04)}
.irow .nm{flex:1;min-width:0}
.irow .nm .t{font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.irow .nm .sub{font-size:.8rem;color:var(--ink-soft);margin-top:2px}
.irow .qty{text-align:right;flex:0 0 auto}
.irow .qty .big{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:600;color:var(--green-d)}
.irow .qty .big.neg{color:var(--clay)}
.irow .qty .u{font-size:.78rem;color:var(--ink-soft)}
.irow .acts{display:flex;gap:6px;flex:0 0 auto}
.iconbtn{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;
  background:var(--paper-2);border:1px solid var(--line);color:var(--ink-soft);transition:.15s}
.iconbtn:hover{border-color:var(--green);color:var(--green-d)}
.iconbtn.danger:hover{border-color:var(--clay);color:var(--clay)}
.warn-note{margin-top:10px;font-size:.85rem;color:var(--clay);background:var(--clay-bg);padding:9px 12px;border-radius:8px;line-height:1.4}
.iconbtn svg{width:17px;height:17px}
.chip{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.02em}
.chip.low{background:var(--clay-bg);color:var(--clay)}
.chip.exp{background:#F4ECD6;color:#8a6a1d}
.chip.sds{background:var(--green-bg,#e3ece4);color:var(--green-d);cursor:pointer}
.chip.sds:hover{filter:brightness(.96)}
.sds-cur{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  background:var(--paper,#faf7f1);border:1px solid var(--line,#e6e0d4);border-radius:9px;padding:8px 12px;margin-bottom:8px}
.sds-cur .fn{font-size:.9rem;font-weight:600;word-break:break-all}
.sds-cur .lnks{display:flex;gap:14px;white-space:nowrap}
.lnk{cursor:pointer;font-size:.85rem;font-weight:600;color:var(--green-d);border-bottom:1px solid currentColor;padding-bottom:1px}
.lnk.danger{color:var(--clay)}
.hint{font-size:.78rem;color:var(--ink-soft);margin-top:6px}
input[type=file]{font-size:.9rem;width:100%}

.log{display:flex;flex-direction:column;gap:8px}
.logrow{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius-s);padding:13px 16px}
.logrow .date{flex:0 0 auto;width:58px;text-align:center;border-right:1px solid var(--line-2);padding-right:12px}
.logrow .date .d{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:600;color:var(--green-d);line-height:1}
.logrow .date .m{font-size:.72rem;color:var(--ink-soft);text-transform:uppercase}
.logrow .body{flex:1;min-width:0}
.logrow .body .t{font-weight:600}
.logrow .body .s{font-size:.82rem;color:var(--ink-soft)}

.empty{text-align:center;padding:54px 20px;color:var(--ink-soft)}
.empty svg{width:54px;height:54px;color:var(--line);margin-bottom:12px}
.empty h3{font-size:1.2rem;color:var(--green-d);margin-bottom:6px}
.empty p{max-width:340px;margin:0 auto 18px}

.detail .back{display:inline-flex;align-items:center;gap:6px;color:var(--ink-soft);font-weight:600;margin-bottom:14px;font-size:.92rem;cursor:pointer}
.detail .back:hover{color:var(--green-d)}
.detail-head{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;box-shadow:var(--shadow);margin-bottom:16px;position:relative;overflow:hidden}
.detail-head::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--green),var(--honey))}
.detail-head h2{font-size:1.7rem;color:var(--green-d);margin-bottom:8px}
.detail-head .yield{display:inline-flex;align-items:center;gap:5px;font-size:.86rem;color:var(--honey-d);
  background:#F6ECDB;padding:4px 11px;border-radius:20px;font-weight:600}
.detail-head .desc{color:var(--ink-soft);margin-top:12px}
.detail-head .cost{margin-top:12px;font-size:.92rem}
.detail-head .cost b{font-family:'Fraunces',serif;color:var(--green-d)}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.panel h3{font-size:1.05rem;color:var(--green-d);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.panel h3 svg{width:18px;height:18px;color:var(--honey)}
.ing-line{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px dashed var(--line-2)}
.ing-line:last-child{border-bottom:none}
.ing-line .nm{font-weight:500}
.ing-line .amt{font-family:'Fraunces',serif;font-weight:600;color:var(--green-d);white-space:nowrap}
.ing-line .miss{color:var(--clay);font-size:.78rem;font-weight:600;margin-left:8px}
.steps{counter-reset:step;list-style:none;display:flex;flex-direction:column;gap:14px}
.steps li{display:flex;gap:14px;align-items:flex-start}
.steps li::before{counter-increment:step;content:counter(step);flex:0 0 auto;
  width:28px;height:28px;border-radius:50%;background:var(--sage);color:var(--green-d);
  font-family:'Fraunces',serif;font-weight:600;display:grid;place-items:center;font-size:.9rem}

.modal-root{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-root.open{display:flex}
.scrim{position:absolute;inset:0;background:rgba(35,42,32,.42);backdrop-filter:blur(2px)}
.sheet{position:relative;background:var(--paper-2);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;
  border-radius:18px 18px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.25);animation:up .22s cubic-bezier(.2,.7,.3,1)}
@keyframes up{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
.sheet-head{position:sticky;top:0;background:var(--paper-2);padding:18px 22px 12px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;z-index:2}
.sheet-head h2{font-size:1.25rem;color:var(--green-d)}
.sheet-body{padding:18px 22px 24px}
.sheet-foot{position:sticky;bottom:0;background:var(--paper-2);padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:10px}
.closeX{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;background:var(--paper);color:var(--ink-soft)}
.closeX:hover{color:var(--clay)}

.field{margin-bottom:15px}
.field label{display:block;font-size:.84rem;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--card)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(61,82,71,.12)}
.field textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.subhead{font-size:.84rem;font-weight:700;color:var(--green-d);text-transform:uppercase;letter-spacing:.04em;
  margin:20px 0 10px;display:flex;align-items:center;justify-content:space-between}
.dynrow{display:grid;grid-template-columns:1fr 86px 38px;gap:8px;margin-bottom:8px;align-items:center}
.dynrow.step{grid-template-columns:1fr 38px}
.miniadd{display:inline-flex;align-items:center;gap:6px;color:var(--honey-d);font-weight:600;font-size:.88rem}
.miniadd:hover{color:var(--honey)}
.delrow{width:38px;height:42px;border-radius:9px;display:grid;place-items:center;background:var(--clay-bg);color:var(--clay)}

.produce-warn{background:var(--clay-bg);border:1px solid #e6c4b8;border-radius:10px;padding:12px 14px;font-size:.88rem;color:#7d3b2a;margin-top:6px}
.produce-warn b{color:var(--clay)}

.prow{display:flex;align-items:center;gap:13px;padding:12px 4px;border-bottom:1px dashed var(--line-2);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.prow:last-of-type{border-bottom:none}
.pcheck{flex:0 0 auto;width:32px;height:32px;border-radius:9px;border:2px solid var(--line);background:var(--card);display:grid;place-items:center;color:#fff;transition:.12s}
.prow:active .pcheck{transform:scale(.92)}
.prow.done .pcheck{background:var(--green);border-color:var(--green)}
.pcheck svg{width:19px;height:19px}
.prow .pnm{flex:1;font-weight:500;min-width:0}
.prow.done .pnm{text-decoration:line-through;color:var(--ink-soft)}
.prow .pamt{font-family:'Fraunces',serif;font-weight:600;color:var(--green-d);white-space:nowrap}
.prow.done .pamt{color:var(--ink-soft)}
.prow .pmiss{color:var(--clay);font-size:.78rem;font-weight:600;margin-left:6px}
.prog{font-size:.82rem;color:var(--ink-soft);font-weight:700}
.prog b{color:var(--green-d)}
.prog.alldone{color:var(--green-d)}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--green-d);color:#fff;
  padding:12px 20px;border-radius:30px;font-weight:600;font-size:.92rem;box-shadow:0 10px 30px -8px rgba(0,0,0,.4);
  opacity:0;transition:.25s;z-index:80;pointer-events:none;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:18px;height:18px}

@media(max-width:560px){
  .nav button span{display:none}
  .nav button{padding:12px 4px}
  .dynrow{grid-template-columns:1fr 72px 36px}
  .stat .n{font-size:1.45rem}
}
@media(min-width:600px){
  .modal-root{align-items:center}
  .sheet{border-radius:18px}
}

/* ---- auth gate ---- */
.authgate{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:22px;background:var(--paper)}
.authgate::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(60,76,63,.04) 1px,transparent 1px);background-size:22px 22px}
.authcard{position:relative;background:var(--paper-2);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:30px 26px;width:100%;max-width:380px;text-align:center}
.authmark{width:60px;height:60px;border-radius:16px;background:var(--green);display:grid;place-items:center;margin:0 auto 16px;box-shadow:var(--shadow)}
.authmark svg{width:36px;height:36px}
.authcard h1{font-size:1.7rem;color:var(--green-d);margin-bottom:6px}
.authsub{color:var(--ink-soft);font-size:.92rem;margin-bottom:22px;line-height:1.45}
.authcard .field{text-align:left}
.autherr{background:var(--clay-bg);color:var(--clay);border-radius:9px;padding:9px 12px;font-size:.85rem;margin-bottom:12px;text-align:left}
.authtoggle{display:block;width:100%;margin-top:14px;color:var(--honey-d);font-weight:600;font-size:.9rem}
.authtoggle:hover{color:var(--honey)}
.authlang{display:flex;gap:4px;justify-content:center;margin-top:18px}
.authlang button{padding:5px 12px;border-radius:7px;font-weight:700;font-size:.78rem;color:var(--ink-soft);border:1px solid var(--line);background:var(--card)}
.authlang button.active{background:var(--green);color:#fff;border-color:var(--green)}
.offlinepill{position:fixed;left:16px;bottom:16px;z-index:70;display:none;align-items:center;gap:8px;background:#5b4636;color:#fff;padding:9px 15px;border-radius:30px;font-size:.84rem;font-weight:600;box-shadow:0 8px 24px -8px rgba(0,0,0,.4)}
.offlinepill .dot{width:8px;height:8px;border-radius:50%;background:#e8a24a;flex:0 0 auto}
#signoutBtn{width:40px;height:40px;border-radius:10px;background:var(--paper-2);border:1px solid var(--line);color:var(--ink-soft);display:grid;place-items:center;margin-left:8px;flex:0 0 auto}
#signoutBtn:hover{border-color:var(--clay);color:var(--clay)}
#signoutBtn svg{width:18px;height:18px}

/* cleaning / hygiene gate */
.clean-status{display:flex;gap:12px;align-items:center;padding:14px 16px;border-radius:14px;margin:4px 0 16px;border:1px solid var(--line)}
.clean-status .ci{width:36px;height:36px;flex:0 0 36px;border-radius:50%;display:grid;place-items:center}
.clean-status .ci svg{width:20px;height:20px}
.clean-status .ct{font-weight:700;font-family:Fraunces,serif;font-size:1.06rem}
.clean-status .cs{font-size:.85rem;color:var(--ink-soft);margin-top:2px}
.clean-status.ok{background:rgba(45,90,61,.08);border-color:rgba(45,90,61,.30)}
.clean-status.ok .ci{background:rgba(45,90,61,.16);color:#2d5a3d}
.clean-status.bad{background:rgba(168,83,43,.09);border-color:rgba(168,83,43,.35)}
.clean-status.bad .ci{background:rgba(168,83,43,.16);color:#a8532b}
.clean-badge{display:inline-flex;gap:6px;align-items:center;font-size:.82rem;font-weight:600;padding:4px 11px;border-radius:999px;margin:2px 0 6px}
.clean-badge svg{width:15px;height:15px}
.clean-badge.ok{background:rgba(45,90,61,.12);color:#2d5a3d}
.clean-badge.bad{background:rgba(168,83,43,.13);color:#a8532b}
.btn[disabled]{opacity:.45;pointer-events:none}
</style>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Receptúra">
</head>
<body>
<div id="authGate" class="authgate">
  <div class="authcard">
    <div class="authmark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#E5E9DD" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 21c0-6 0-10 0-14"/>
        <path d="M12 11c-3 0-5-1.5-5.5-4.5C9 6.5 11 8 12 11z" fill="#E5E9DD" stroke="none"/>
        <path d="M12 14c3 0 5-1.5 5.5-4.5C15 9.5 13 11 12 14z" fill="#BC7C36" stroke="none" opacity=".9"/>
        <path d="M12 8c-2.2-.4-3.6-2-3.8-4.4C10.4 4 11.6 5.6 12 8z" fill="#E5E9DD" stroke="none"/>
      </svg>
    </div>
    <h1>Receptúra</h1>
    <p id="auth_sub" class="authsub"></p>
    <div class="field"><label id="auth_email_l"></label><input id="auth_email" type="email" autocomplete="username" inputmode="email"></div>
    <div class="field"><label id="auth_pw_l"></label><input id="auth_pw" type="password" autocomplete="current-password"></div>
    <div id="auth_err" class="autherr" style="display:none"></div>
    <button id="auth_primary" class="btn btn-primary btn-block" onclick="authPrimary()"></button>
    <button id="auth_toggle" class="authtoggle" onclick="toggleAuthMode()"></button>
    <div class="authlang"><button id="al-hu" onclick="setLang('hu')">HU</button><button id="al-en" onclick="setLang('en')">EN</button></div>
  </div>
</div>
<div class="app" id="app" style="display:none">
  <header class="topbar">

/* ---- local cache: instant load + offline ---- */
const CACHE_KEY='receptura.cache.v2';
function cacheSave(){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify({ingredients:state.ingredients,recipes:state.recipes,batches:state.batches,cleanings:state.cleanings,lang:lang})); }catch(e){} }
function cacheLoad(){ try{ const raw=localStorage.getItem(CACHE_KEY); if(raw){ const d=JSON.parse(raw); state.ingredients=d.ingredients||[]; state.recipes=d.recipes||[]; state.batches=d.batches||[]; state.cleanings=d.cleanings||[]; if(d.lang) state.lang=d.lang; return true; } }catch(e){} return false; }

/* ---- map app objects <-> database columns ---- */
const toRow = {
  ingredient: g => ({ id:g.id, name:g.name, unit:g.unit, stock:num(g.stock), min_stock:num(g.minStock), price:num(g.price), expiry:g.expiry||null, notes:g.notes||'', batch:g.batch||null, sds_path:g.sdsPath||null, sds_name:g.sdsName||null, seed_key:g.seedKey||null }),
  recipe: r => ({ id:r.id, name:r.name, yield_text:r.yield||'', description:r.description||'', items:r.items||[], steps:r.steps||[], seed_key:r.seedKey||null }),
  batch: b => ({ id:b.id, date:b.date, recipe_id:b.recipeId, recipe_name:b.recipeName, multiplier:num(b.multiplier), lines:b.lines||[] }),
  cleaning: c => ({ id:c.id, ts:c.ts, done_by:c.by||'', steps:c.steps||[], note:c.note||'' }),
};
const fromRow = {
  ingredient: r => ({ id:r.id, name:r.name, unit:r.unit, stock:Number(r.stock)||0, minStock:Number(r.min_stock)||0, price:Number(r.price)||0, expiry:r.expiry||'', notes:r.notes||'', batch:r.batch||'', sdsPath:r.sds_path||'', sdsName:r.sds_name||'', seedKey:r.seed_key||undefined }),
  recipe: r => ({ id:r.id, name:r.name, yield:r.yield_text||'', description:r.description||'', items:r.items||[], steps:r.steps||[], seedKey:r.seed_key||undefined }),
  batch: r => ({ id:r.id, date:r.date, recipeId:r.recipe_id, recipeName:r.recipe_name, multiplier:Number(r.multiplier)||0, lines:r.lines||[] }),
  cleaning: r => ({ id:r.id, ts:r.ts, by:r.done_by||'', steps:r.steps||[], note:r.note||'' }),
};

/* ---- pull everything from Supabase ---- */
async function pull(){
  const [i,r,b] = await Promise.all([ sb.from('ingredients').select('*'), sb.from('recipes').select('*'), sb.from('batches').select('*') ]);
  if(i.error||r.error||b.error) throw (i.error||r.error||b.error);
  state.ingredients = i.data.map(fromRow.ingredient);
  state.recipes = r.data.map(fromRow.recipe);
  state.batches = b.data.map(fromRow.batch);
  try{ const cl=await sb.from('cleanings').select('*'); if(!cl.error && cl.data) state.cleanings = cl.data.map(fromRow.cleaning); }catch(e){}
  cacheSave();
}

/* ---- saveState: cache immediately, then debounced sync to Supabase ---- */
function saveState(){ cacheSave(); scheduleReconcile(); }
function scheduleReconcile(){ if(!authed) return; clearTimeout(reconcileTimer); reconcileTimer=setTimeout(reconcile, 350); }
async function reconcile(){
  if(!authed) return;
  try{
    lastLocalWrite=Date.now();
    if(state.ingredients.length){ const {error}=await sb.from('ingredients').upsert(state.ingredients.map(toRow.ingredient)); if(error) throw error; }
    if(state.recipes.length){ const {error}=await sb.from('recipes').upsert(state.recipes.map(toRow.recipe)); if(error) throw error; }
    if(state.batches.length){ const {error}=await sb.from('batches').upsert(state.batches.map(toRow.batch)); if(error) throw error; }
    try{ if(state.cleanings.length){ const {error}=await sb.from('cleanings').upsert(state.cleanings.map(toRow.cleaning)); if(error) throw error; } await reconcileDeletes('cleanings', state.cleanings); }catch(e){ /* cleanings table may not exist yet */ }
    await reconcileDeletes('ingredients', state.ingredients);
    await reconcileDeletes('recipes', state.recipes);
    await reconcileDeletes('batches', state.batches);
    lastLocalWrite=Date.now();
    setOffline(false);
  }catch(e){ console.warn('Sync deferred:', e&&e.message); setOffline(true); }
}
async function reconcileDeletes(table, localArr){
  const { data, error } = await sb.from(table).select('id'); if(error) throw error;
  const ids = new Set(localArr.map(x=>x.id));
  const del = data.filter(row=>!ids.has(row.id)).map(row=>row.id);
  if(del.length){ const { error:e2 } = await sb.from(table).delete().in('id', del); if(e2) throw e2; }
}

/* ---- realtime: pick up changes from other devices ---- */
function subscribeRealtime(){
  sb.channel('receptura-rt')
    .on('postgres_changes', { event:'*', schema:'public' }, () => {
      if(Date.now()-lastLocalWrite < 2500) return;            // ignore our own write echo
      clearTimeout(pullTimer);
      pullTimer=setTimeout(async ()=>{ try{ await pull(); if(!document.getElementById('modalRoot').classList.contains('open')) render(); }catch(e){} }, 400);
    }).subscribe();
}

function showAuth(){ document.getElementById('app').style.display='none'; const so=document.getElementById('signoutBtn'); if(so) so.style.display='none'; const g=document.getElementById('authGate'); g.style.display='flex'; applyAuthChrome(); }
function applyAuthChrome(){
  const set=(id,val)=>{ const el=document.getElementById(id); if(el) el.textContent=val; };
  set('auth_sub', t('auth_sub')); set('auth_email_l', t('auth_email')); set('auth_pw_l', t('auth_password'));
  set('auth_primary', authMode==='signin'?t('auth_signin'):t('auth_signup'));
  set('auth_toggle', authMode==='signin'?t('auth_to_signup'):t('auth_to_signin'));
  const ah=document.getElementById('al-hu'), ae=document.getElementById('al-en');
  if(ah) ah.classList.toggle('active',lang==='hu'); if(ae) ae.classList.toggle('active',lang==='en');
  document.documentElement.lang=lang;
}
function toggleAuthMode(){ authMode = authMode==='signin'?'signup':'signin'; const e=document.getElementById('auth_err'); if(e) e.style.display='none'; applyAuthChrome(); }
function authError(msg){ const e=document.getElementById('auth_err'); if(e){ e.textContent=msg; e.style.display='block'; } }
async function authPrimary(){
  const email=document.getElementById('auth_email').value.trim();
  const pw=document.getElementById('auth_pw').value;
  if(!email||!pw){ authError(t('auth_fill')); return; }
  document.getElementById('auth_primary').textContent=t('auth_wait');
  try{
    const res = authMode==='signin' ? await sb.auth.signInWithPassword({email,password:pw}) : await sb.auth.signUp({email,password:pw});
    if(res.error){ authError(res.error.message); applyAuthChrome(); return; }
    if(!res.data.session){ authError(t('auth_check_email')); applyAuthChrome(); return; }
    /* onAuthStateChange starts the app */
  }catch(e){ authError((e&&e.message)||'Error'); applyAuthChrome(); }
}
async function signOut(){ try{ await sb.auth.signOut(); }catch(e){} }

/* ---- start the app once signed in ---- */
async function startApp(){
  document.getElementById('authGate').style.display='none';
  document.getElementById('app').style.display='';
  const so=document.getElementById('signoutBtn'); if(so) so.style.display='';
  cacheLoad(); lang = state.lang||lang||'hu'; state.lang=lang;
  applyChrome(); render();                                   // instant from cache
  try{
    await pull();
    if(state.ingredients.length===0 && state.recipes.length===0 && !localStorage.getItem('receptura.seeded')){
      seed(); localStorage.setItem('receptura.seeded','1'); saveState();
    }
    applyChrome(); render(); setOffline(false);
  }catch(e){ setOffline(true); }
  subscribeRealtime();
}

/* ============ helpers ============ */
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const num = v => { const n=parseFloat(String(v).replace(',','.')); return isNaN(n)?0:n; };
const fmtNum = n => (Math.round(n*100)/100).toLocaleString(CUR[lang].locale);
function money(n){ const c=CUR[lang]; const v=n.toLocaleString(c.locale,{minimumFractionDigits:c.dec,maximumFractionDigits:c.dec}); return c.before? c.sym+v : v+' '+c.sym; }
function priceUnit(n,unit){ const c=CUR[lang]; const v=fmtNum(n); return c.before?`${c.sym}${v}/${esc(unitLabel(unit))}`:`${v} ${c.sym}/${esc(unitLabel(unit))}`; }
const ing = id => state.ingredients.find(x=>x.id===id);
const recipeCost = r => r.items.reduce((s,it)=>{ const g=ing(it.ingredientId); return s + (g? num(g.price)*num(it.amount):0); },0);
const isLow = g => num(g.minStock)>0 && num(g.stock) <= num(g.minStock);

function toast(msg){
  const el=document.getElementById('toast');
  el.innerHTML = I.check + '<span>'+esc(msg)+'</span>';
  el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2200);
}

/* ============ RECIPES ============ */
function renderRecipes(){
  const low=state.ingredients.filter(isLow).length;
  const stats=`<div class="stats">
    <div class="stat"><div class="n">${state.recipes.length}</div><div class="l">${t('stat_recipes')}</div></div>
    <div class="stat"><div class="n">${state.ingredients.length}</div><div class="l">${t('stat_ingredients')}</div></div>
    <div class="stat ${low?'warn':''}"><div class="n">${low}</div><div class="l">${t('stat_low')}</div></div>
  </div>`;
  const q=search.recipes.toLowerCase();
  const list=state.recipes.filter(r=>recName(r).toLowerCase().includes(q));
  const head=`<div class="shead"><h2>${t('recipes_title')}</h2>
    <div class="search">${I.search}<input placeholder="${t('search')}" value="${esc(search.recipes)}" oninput="search.recipes=this.value;rerenderList('recipes')"></div>
    <button class="btn btn-primary" onclick="openRecipeForm()">${I.plus}<span>${t('new_recipe')}</span></button></div>`;
  let body;
  if(state.recipes.length===0){
    body=emptyState(I.flask,t('empty_recipes_title'),t('empty_recipes_text'),t('new_recipe'),'openRecipeForm()');
  } else if(list.length===0){
    body=`<div class="empty"><h3>${t('no_results')}</h3><p>${t('no_results_named',esc(search.recipes))}</p></div>`;
  } else {
    body=`<div class="grid">`+list.map(r=>{
      const cost=recipeCost(r);
      return `<div class="rcard" onclick="openDetail('${r.id}')">
        <div class="sprig">${I.sprig}</div>
        <h3>${esc(recName(r))}</h3>
        ${r.yield?`<div class="yield">${I.beaker}${esc(r.yield)}</div>`:''}
        <div class="meta"><span><b>${r.items.length}</b> ${t('count_ingredient')}</span>${cost>0?`<span>≈ <b>${money(cost)}</b>${t('per_batch')}</span>`:''}</div>
      </div>`;
    }).join('')+`</div>`;
  }
  return stats+head+body;
}

/* ============ DETAIL ============ */
function renderDetail(id){
  const r=state.recipes.find(x=>x.id===id);
  if(!r){ detailId=null; return renderRecipes(); }
  const cost=recipeCost(r);
  const items=r.items.map(it=>{
    const g=ing(it.ingredientId);
    const name=g?ingName(g):t('deleted_ingredient'); const unit=g?unitLabel(g.unit):'';
    const short=g && num(g.stock)<num(it.amount);
    return `<div class="ing-line"><span class="nm">${esc(name)}${short?`<span class="miss">${t('low_inline')}</span>`:''}</span>
      <span class="amt">${fmtNum(it.amount)} ${esc(unit)}</span></div>`;
  }).join('') || `<div class="ing-line"><span class="nm" style="color:var(--ink-soft)">${t('no_ingredients_line')}</span></div>`;
  const sList=recSteps(r);
  const steps=(sList&&sList.length)?`<ol class="steps">${sList.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`
    :`<p style="color:var(--ink-soft)">${t('no_method')}</p>`;
  const desc=recDesc(r);
  return `<div class="detail">
    <a class="back" onclick="closeDetail()">${I.back} ${t('back_recipes')}</a>
    <div class="detail-head">
      <h2>${esc(recName(r))}</h2>
      ${r.yield?`<div class="yield">${I.beaker}${esc(r.yield)} / ${t('per_batch_word')}</div>`:''}
      ${desc?`<div class="desc">${esc(desc)}</div>`:''}
      ${cost>0?`<div class="cost">${t('est_cost_label')} <b>${money(cost)}</b> / ${t('per_batch_word')}</div>`:''}
      <div class="detail-actions">
        <button class="btn btn-green" onclick="openProduce('${r.id}')">${I.beaker}${t('make_batch')}</button>
        <button class="btn btn-ghost" onclick="openRecipeForm('${r.id}')">${I.edit}${t('edit')}</button>
        <button class="btn btn-danger" onclick="confirmDeleteRecipe('${r.id}')">${I.trash}${t('del')}</button>
      </div>
    </div>
    <div class="panel"><h3>${I.list} ${t('ingredients_panel')}</h3>${items}</div>
    <div class="panel"><h3>${I.flask} ${t('method_panel')}</h3>${steps}</div>
  </div>`;
}
function openDetail(id){ detailId=id; render(); window.scrollTo(0,0); }
function closeDetail(){ detailId=null; render(); }

    <div class="search">${I.search}<input placeholder="${t('search')}" value="${esc(search.ingredients)}" oninput="search.ingredients=this.value;rerenderList('ingredients')"></div>
    <button class="btn btn-primary" onclick="openIngredientForm()">${I.plus}<span>${t('new_ingredient')}</span></button></div>`;
  let body;
  if(state.ingredients.length===0){
    body=emptyState(I.flask,t('empty_ingredients_title'),t('empty_ingredients_text'),t('new_ingredient'),'openIngredientForm()');
  } else if(list.length===0){
    body=`<div class="empty"><h3>${t('no_results')}</h3></div>`;
  } else {
    body=`<div class="ilist">`+list.map(g=>{
      const stock=num(g.stock), low=isLow(g), ul=unitLabel(g.unit);

      return `<div class="irow">
        <div class="nm"><div class="t">${esc(ingName(g))}
          ${low?`<span class="chip low">${t('chip_low')}</span>`:''}
          ${expSoon?`<span class="chip exp">${t('chip_exp')}</span>`:''}
          ${g.sdsPath?`<span class="chip sds" title="${t('f_sds')}" onclick="event.stopPropagation();openSDS('${esc(g.sdsPath)}')">${t('sds_chip')}</span>`:''}</div>
          <div class="sub">${sub}</div></div>
        <div class="qty"><div class="big ${stock<0?'neg':''}">${fmtNum(stock)}</div><div class="u">${esc(ul)} ${t('in_stock')}</div></div>
        <div class="acts">
          <button class="iconbtn" title="${t('adjust_stock_title')}" onclick="openAdjust('${g.id}')">${I.plus}</button>
          <button class="iconbtn" title="${t('edit')}" onclick="openIngredientForm('${g.id}')">${I.edit}</button>
          <button class="iconbtn danger" title="${t('del')}" onclick="confirmDeleteIngredient('${g.id}')">${I.trash}</button>
        </div>
      </div>`;
    }).join('')+`</div>`;
  }
  return head+body;
}

/* ============ LOG ============ */
function renderLog(){
  const head=`<div class="shead"><h2>${t('log_title')}</h2></div>`;
  if(state.batches.length===0){
    return head+emptyState(I.beaker,t('empty_log_title'),t('empty_log_text'),'','');
  }
  const sorted=[...state.batches].sort((a,b)=>b.date.localeCompare(a.date));
  const rows=sorted.map(b=>{
    const d=new Date(b.date);
    const lines=b.lines.map(l=>`${esc(l.name)} ${fmtNum(l.amount)} ${esc(unitLabel(l.unit))}`).join(' · ');
    return `<div class="logrow">
      <div class="date"><div class="d">${d.getDate()}</div><div class="m">${MONTHS[lang][d.getMonth()]}</div></div>
      <div class="body"><div class="t">${esc(b.recipeName)} — ${fmtNum(b.multiplier)} ${batchWord(b.multiplier)}</div>
        <div class="s">${lines||'—'}</div></div>
      <button class="iconbtn" title="${t('delete_entry_title')}" onclick="deleteBatch('${b.id}')">${I.trash}</button>
    </div>`;
  }).join('');
  return head+`<div class="log">${rows}</div>`;
}

function emptyState(icon,title,text,btnLabel,btnAction){
  return `<div class="empty">${icon}<h3>${title}</h3><p>${text}</p>
    ${btnLabel?`<button class="btn btn-primary" onclick="${btnAction}">${I.plus}${btnLabel}</button>`:''}</div>`;
}
function rerenderList(which){
  const g=document.getElementById('view');
  g.innerHTML = which==='recipes'?renderRecipes():renderIngredients();
  const inp=document.querySelector('.search input'); if(inp){ inp.focus(); const v=which==='recipes'?search.recipes:search.ingredients; try{inp.setSelectionRange(v.length,v.length);}catch(e){} }
}

    <a class="lnk danger" onclick="markSdsRemove()">${t('sds_remove')}</a></span></div>`;
}
function markSdsRemove(){ sdsPendingRemove=true; const c=document.getElementById('sdsCur'); if(c) c.innerHTML=`<div class="hint">${t('sds_will_remove')}</div>`; }
async function uploadSDS(file, ingId){
  const safe=(file.name||'sds').replace(/[^a-zA-Z0-9._-]/g,'_').slice(-60);
  const path=`${ingId}/${Date.now()}_${safe}`;
  const { error } = await sb.storage.from('sds').upload(path, file, { upsert:true, contentType:file.type||'application/octet-stream' });
  if(error) throw error;
  return path;
}
async function openSDS(path){
  try{
    const { data, error } = await sb.storage.from('sds').createSignedUrl(path, 120);
    if(error||!data) throw error||new Error('no url');
    window.open(data.signedUrl, '_blank');
  }catch(e){ toast(t('sds_open_failed')); }
}
async function saveIngredient(id){
  const name=document.getElementById('f_name').value.trim();
  if(!name){ toast(t('need_name')); return; }
  const realId = id || uid();
  const g = id?ing(id):null;
  let sdsPath = g?(g.sdsPath||''):''; let sdsName = g?(g.sdsName||''):'';
  const fileInput=document.getElementById('f_sds');
  const file=fileInput && fileInput.files && fileInput.files[0];
  if(sdsPendingRemove){
    if(sdsPath){ try{ await sb.storage.from('sds').remove([sdsPath]); }catch(e){} }
    sdsPath=''; sdsName='';
  }
  if(file){
    const btn=document.getElementById('ingSaveBtn'); if(btn){ btn.disabled=true; btn.textContent=t('sds_uploading'); }
    try{
      if(sdsPath){ try{ await sb.storage.from('sds').remove([sdsPath]); }catch(e){} }
      sdsPath = await uploadSDS(file, realId);
      sdsName = file.name;
    }catch(e){ toast(t('sds_upload_failed')); if(btn){ btn.disabled=false; btn.textContent=t('save'); } return; }
  }
  const data={ name, unit:document.getElementById('f_unit').value,
    stock:num(document.getElementById('f_stock').value), minStock:num(document.getElementById('f_min').value),
    price:num(document.getElementById('f_price').value), expiry:document.getElementById('f_expiry').value,
    batch:document.getElementById('f_batch').value.trim(), sdsPath, sdsName,
    notes:document.getElementById('f_notes').value.trim() };
  if(id){ Object.assign(g,data); delete g.seedKey; }
  else { state.ingredients.push({id:realId,...data}); }
  sdsPendingRemove=false;
  await saveState(); closeModal(); render(); toast(id?t('ingredient_updated'):t('ingredient_added'));
}

/* ============ ADJUST STOCK ============ */
function openAdjust(id){
  const g=ing(id); const ul=unitLabel(g.unit);
  openModal(`
    <div class="sheet-head"><h2>${t('adjust_title',esc(ingName(g)))}</h2><button class="closeX" onclick="closeModal()">✕</button></div>
    <div class="sheet-body">
      <p style="color:var(--ink-soft);margin-bottom:14px">${t('currently')} <b style="color:var(--green-d)">${fmtNum(g.stock)} ${esc(ul)}</b></p>
      <div class="field"><label>${t('amount')} (${esc(ul)})</label><input id="adj_amt" inputmode="decimal" placeholder="250"></div>
    </div>
    <div class="sheet-foot">
      <button class="btn btn-danger" onclick="applyAdjust('${id}',-1)">${I.minus}${t('use_btn')}</button>
      <button class="btn btn-green btn-block" onclick="applyAdjust('${id}',1)">${I.plus}${t('add_stock_btn')}</button>
    </div>`);
  setTimeout(()=>document.getElementById('adj_amt').focus(),60);
}
async function applyAdjust(id,sign){
  const a=num(document.getElementById('adj_amt').value);
  if(a<=0){ toast(t('enter_amount')); return; }
  const g=ing(id); g.stock=num(g.stock)+sign*a;
  await saveState(); closeModal(); render(); toast(sign>0?t('stock_added'):t('stock_removed'));
}

/* ============ RECIPE FORM ============ */
let formItems=[], formSteps=[];
function openRecipeForm(id){
  const r=id?state.recipes.find(x=>x.id===id):{name:'',yield:'',description:'',items:[],steps:[]};
  formItems=r.items.map(x=>({...x})); if(formItems.length===0) formItems.push({ingredientId:'',amount:''});
  formSteps=[...recSteps(r)]; if(formSteps.length===0) formSteps.push('');
  const nameVal=id?recName(r):''; const descVal=id?recDesc(r):'';
  openModal(`
    <div class="sheet-head"><h2>${id?t('edit_recipe'):t('new_recipe')}</h2><button class="closeX" onclick="closeModal()">✕</button></div>
    <div class="sheet-body">
      <div class="field"><label>${t('r_name')}</label><input id="r_name" value="${esc(nameVal)}" placeholder="${t('ph_recipe')}"></div>
      <div class="field"><label>${t('r_yield')}</label><input id="r_yield" value="${esc(r.yield)}" placeholder="${t('ph_yield')}"></div>
      <div class="field"><label>${t('r_desc')}</label><textarea id="r_desc" placeholder="${t('optional')}">${esc(descVal)}</textarea></div>
      <div class="subhead"><span>${t('ingredients_section')}</span></div>
      <div id="itemRows"></div>
      <button class="miniadd" onclick="addItemRow()">${I.plus} ${t('add_ingredient_btn')}</button>
      <div class="subhead" style="margin-top:24px"><span>${t('method_section')}</span></div>
      <div id="stepRows"></div>
      <button class="miniadd" onclick="addStepRow()">${I.plus} ${t('add_step_btn')}</button>
    </div>
    <div class="sheet-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary btn-block" onclick="saveRecipe('${id||''}')">${I.check}${t('save')}</button>
    </div>`);
  drawItemRows(); drawStepRows();
}
function ingOptions(sel){
  if(state.ingredients.length===0) return `<option value="">${t('add_ing_first')}</option>`;
  return `<option value="">${t('choose')}</option>`+state.ingredients.map(g=>`<option value="${g.id}" ${g.id===sel?'selected':''}>${esc(ingName(g))} (${esc(unitLabel(g.unit))})</option>`).join('');
}
function drawItemRows(){
  document.getElementById('itemRows').innerHTML=formItems.map((it,i)=>`
    <div class="dynrow">
      <select onchange="formItems[${i}].ingredientId=this.value">${ingOptions(it.ingredientId)}</select>
      <input inputmode="decimal" placeholder="${t('ph_amount')}" value="${esc(it.amount)}" oninput="formItems[${i}].amount=this.value">
      <button class="delrow" onclick="formItems.splice(${i},1);drawItemRows()">${I.trash}</button>
    </div>`).join('');
}
function addItemRow(){ formItems.push({ingredientId:'',amount:''}); drawItemRows(); }
function drawStepRows(){
  document.getElementById('stepRows').innerHTML=formSteps.map((s,i)=>`
    <div class="dynrow step">
      <input value="${esc(s)}" placeholder="${t('ph_step',i+1)}" oninput="formSteps[${i}]=this.value">
      <button class="delrow" onclick="formSteps.splice(${i},1);drawStepRows()">${I.trash}</button>
    </div>`).join('');
}
function addStepRow(){ formSteps.push(''); drawStepRows(); }
async function saveRecipe(id){
  const name=document.getElementById('r_name').value.trim();
  if(!name){ toast(t('need_recipe_name')); return; }
  const items=formItems.filter(it=>it.ingredientId && num(it.amount)>0).map(it=>({ingredientId:it.ingredientId,amount:num(it.amount)}));
  const steps=formSteps.map(s=>s.trim()).filter(Boolean);
  const data={ name, yield:document.getElementById('r_yield').value.trim(), description:document.getElementById('r_desc').value.trim(), items, steps };
  if(id){ const r=state.recipes.find(x=>x.id===id); Object.assign(r,data); delete r.seedKey; }
  else { const nid=uid(); state.recipes.push({id:nid,...data}); detailId=nid; }
  await saveState(); closeModal(); render(); toast(id?t('recipe_updated'):t('recipe_created'));
}
function confirmDeleteRecipe(id){
  const r=state.recipes.find(x=>x.id===id);
  openModal(`
    <div class="sheet-head"><h2>${t('delete_recipe_title')}</h2><button class="closeX" onclick="closeModal()">✕</button></div>
    <div class="sheet-body"><p>${t('delete_recipe_confirm','<b>'+esc(recName(r))+'</b>')}</p></div>
    <div class="sheet-foot"><button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-danger btn-block" onclick="doDeleteRecipe('${id}')">${I.trash}${t('del')}</button></div>`);
}
async function doDeleteRecipe(id){
  state.recipes=state.recipes.filter(x=>x.id!==id); detailId=null;
  await saveState(); closeModal(); setView('recipes'); toast(t('recipe_deleted'));
}
function ingredientUsage(id){ return state.recipes.filter(r=>(r.items||[]).some(it=>it.ingredientId===id)).length; }
function confirmDeleteIngredient(id){
  const g=ing(id); if(!g) return;
  const uses=ingredientUsage(id);
  openModal(`
    <div class="sheet-head"><h2>${t('delete_ingredient_title')}</h2><button class="closeX" onclick="closeModal()">✕</button></div>
    <div class="sheet-body"><p>${t('delete_ingredient_confirm','<b>'+esc(ingName(g))+'</b>')}</p>
      ${uses>0?`<p class="warn-note">${t('ingredient_in_use',uses)}</p>`:''}</div>
    <div class="sheet-foot"><button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-danger btn-block" onclick="doDeleteIngredient('${id}')">${I.trash}${t('del')}</button></div>`);
}
async function doDeleteIngredient(id){
  state.ingredients=state.ingredients.filter(x=>x.id!==id);
  await saveState(); closeModal(); render(); toast(t('ingredient_deleted'));
}

/* ============ PRODUCE ============ */
let produceChecked={}, produceValidIds=[];
function openProduce(id){
  if(!cleaningValid()){ pendingProduceId=id; openCleaningRequired(); return; }
  const r=state.recipes.find(x=>x.id===id); produceChecked={}; renderProduce(r,1);
}
function renderProduce(r,mult){
  mult=mult||1;
  produceValidIds=r.items.filter(it=>ing(it.ingredientId)).map(it=>it.ingredientId);
  const rows=r.items.map(it=>{
    const g=ing(it.ingredientId); if(!g) return '';
    const need=num(it.amount)*mult; const after=num(g.stock)-need; const short=after<0;
    const done=!!produceChecked[it.ingredientId];
    return `<div class="prow ${done?'done':''}" id="prow_${it.ingredientId}" onclick="toggleProduceCheck('${it.ingredientId}')">
      <div class="pcheck" id="pchk_${it.ingredientId}">${done?I.check:''}</div>
      <span class="pnm">${esc(ingName(g))}</span>
      <span class="pamt">${fmtNum(need)} ${esc(unitLabel(g.unit))}${short?`<span class="pmiss">${t('short_by',fmtNum(-after))}</span>`:''}</span>
    </div>`;
  }).join('');
  const checked=produceValidIds.filter(id=>produceChecked[id]).length;
  const total=produceValidIds.length; const allDone=total>0&&checked===total;
  const shortages=r.items.filter(it=>{const g=ing(it.ingredientId);return g && num(g.stock)<num(it.amount)*mult;});
  const warn=shortages.length?`<div class="produce-warn"><b>${t('warn_label')}</b> ${t('warn_text',shortages.length)}</div>`:'';
  openModal(`
    <div class="sheet-head"><h2>${t('produce_title')}</h2><button class="closeX" onclick="closeModal()">✕</button></div>
    <div class="sheet-body">
      <p style="margin-bottom:4px;font-weight:600;color:var(--green-d);font-family:Fraunces,serif;font-size:1.15rem">${esc(recName(r))}</p>
      ${cleanBadgeHTML()}
      <div class="field" style="margin-top:14px"><label>${t('how_many')}</label>
        <input id="prod_mult" inputmode="decimal" value="${mult}" oninput="updateProduce('${r.id}',this.value)"></div>
      <div class="subhead"><span>${t('usage_tick')}</span>
        <span class="prog ${allDone?'alldone':''}" id="prodProgress">${t('added_count',checked,total)}</span></div>
      ${rows||`<p style="color:var(--ink-soft)">${t('no_ingredients_recipe')}</p>`}
      ${warn}
    </div>
    <div class="sheet-foot">
      <button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-green btn-block" onclick="doProduce('${r.id}')">${I.check}${t('produce_btn')}</button>
    </div>`);
}
function toggleProduceCheck(id){
  produceChecked[id]=!produceChecked[id];
  const row=document.getElementById('prow_'+id); const box=document.getElementById('pchk_'+id);
  if(row) row.classList.toggle('done',produceChecked[id]);
  if(box) box.innerHTML=produceChecked[id]?I.check:'';
  const checked=produceValidIds.filter(x=>produceChecked[x]).length; const total=produceValidIds.length;
  const prog=document.getElementById('prodProgress');
  if(prog){ prog.innerHTML=t('added_count',checked,total); prog.classList.toggle('alldone',total>0&&checked===total); }
}
function updateProduce(id,v){
  const r=state.recipes.find(x=>x.id===id); const m=num(v)||0;
  const input=document.getElementById('prod_mult'); const caret=input.selectionStart;
  renderProduce(r,m);
  const ni=document.getElementById('prod_mult'); ni.focus(); try{ni.setSelectionRange(caret,caret);}catch(e){}
}
async function doProduce(id){
  if(!cleaningValid()){ closeModal(); toast(t('clean_required_toast')); setView('cleaning'); return; }
  const r=state.recipes.find(x=>x.id===id);
  const mult=num(document.getElementById('prod_mult').value);
  if(mult<=0){ toast(t('need_batches')); return; }
  const lines=[];
  r.items.forEach(it=>{ const g=ing(it.ingredientId); if(!g) return;
    const used=num(it.amount)*mult; g.stock=num(g.stock)-used; lines.push({name:ingName(g),amount:used,unit:g.unit}); });
  state.batches.push({ id:uid(), date:new Date().toISOString().slice(0,10), recipeId:r.id, recipeName:recName(r), multiplier:mult, lines });
  await saveState(); closeModal();
  toast(t('made', fmtNum(mult), batchWord(mult), recName(r))); setView('log');
}
async function deleteBatch(id){
  state.batches=state.batches.filter(b=>b.id!==id);
  await saveState(); render(); toast(t('entry_deleted'));
}

/* ============ CLEANING — hygiene gate ============ */
function cleanSteps(){ return CLEAN_STEPS[lang]||CLEAN_STEPS.hu; }
function lastCleaning(){ if(!state.cleanings||!state.cleanings.length) return null;
  return [...state.cleanings].sort((a,b)=>String(b.ts).localeCompare(String(a.ts)))[0]; }
function cleaningValid(){ const c=lastCleaning(); if(!c) return false;
  return (Date.now()-new Date(c.ts).getTime()) < CLEAN_WINDOW_MS; }
function cleanValidUntil(){ const c=lastCleaning(); if(!c) return null; return new Date(new Date(c.ts).getTime()+CLEAN_WINDOW_MS); }
function fmtWhen(d){ d=new Date(d); return d.toLocaleString(CUR[lang].locale,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function fmtTime(d){ d=new Date(d); return d.toLocaleTimeString(CUR[lang].locale,{hour:'2-digit',minute:'2-digit'}); }
function cleanBadgeHTML(){
  if(cleaningValid()) return `<div class="clean-badge ok">${I.check}<span>${t('clean_ok_until',fmtTime(cleanValidUntil()))}</span></div>`;
  return `<div class="clean-badge bad">${I.warn}<span>${t('clean_needed')}</span></div>`;
}
function renderCleaning(){
  const steps=cleanSteps(); const valid=cleaningValid(); const last=lastCleaning();
  const statusCard=`<div class="clean-status ${valid?'ok':'bad'}">
      <div class="ci">${valid?I.check:I.warn}</div>
      <div><div class="ct">${valid?t('clean_status_ok'):t('clean_status_bad')}</div>
      <div class="cs">${last? t('clean_last',fmtWhen(last.ts))+(last.by?` \u00b7 ${esc(last.by)}`:'') : t('clean_never')}${valid?` \u00b7 ${t('clean_until',fmtTime(cleanValidUntil()))}`:''}</div></div>
    </div>`;
  const rows=steps.map((sx,idx)=>{ const done=!!cleanChecked[idx];
    return `<div class="prow ${done?'done':''}" onclick="toggleCleanCheck(${idx})"><div class="pcheck">${done?I.check:''}</div><span class="pnm">${esc(sx)}</span></div>`; }).join('');
  const doneCount=steps.filter((sx,idx)=>cleanChecked[idx]).length;
  const allDone=steps.length>0 && doneCount===steps.length;
  const hist=(state.cleanings&&state.cleanings.length)?[...state.cleanings].sort((a,b)=>String(b.ts).localeCompare(String(a.ts))).slice(0,12).map(c=>`
      <div class="logrow"><div class="date"><div class="d">${new Date(c.ts).getDate()}</div><div class="m">${MONTHS[lang][new Date(c.ts).getMonth()]}</div></div>
        <div class="body"><div class="t">${t('clean_done_title')} \u2014 ${fmtTime(c.ts)}</div><div class="s">${c.by?esc(c.by):'\u2014'}${c.note?` \u00b7 ${esc(c.note)}`:''}</div></div>
        <button class="iconbtn" title="${t('del')}" onclick="deleteCleaning('${c.id}')">${I.trash}</button></div>`).join(''):'';
  return `<div class="shead"><h2>${t('clean_title')}</h2></div>
    ${statusCard}
    <div class="panel"><h3>${I.check} ${t('clean_checklist')}</h3>
      <p style="color:var(--ink-soft);margin:-2px 0 12px;font-size:.92rem">${t('clean_intro')}</p>
      ${rows}
      <div class="subhead" style="margin-top:12px"><span>${t('added_count',doneCount,steps.length)}</span></div>
      <button class="btn btn-green btn-block" style="margin-top:12px" ${allDone?'':'disabled'} onclick="logCleaning()">${I.check}${t('clean_log_btn')}</button>
    </div>
    ${hist?`<div class="panel"><h3>${I.list} ${t('clean_history')}</h3><div class="log">${hist}</div></div>`:''}`;
}
function toggleCleanCheck(idx){ cleanChecked[idx]=!cleanChecked[idx]; render(); }
async function logCleaning(){
  const steps=cleanSteps(); if(!steps.every((sx,idx)=>cleanChecked[idx])){ toast(t('clean_incomplete')); return; }
  state.cleanings.push({ id:uid(), ts:new Date().toISOString(), by:userEmail||'', steps:steps.slice(), note:'' });
  cleanChecked={};
  await saveState(); toast(t('clean_saved'));
  if(pendingProduceId){ const pid=pendingProduceId; pendingProduceId=null; view='recipes'; openProduce(pid); }
  else render();
}
async function deleteCleaning(id){ state.cleanings=state.cleanings.filter(c=>c.id!==id); await saveState(); render(); toast(t('entry_deleted')); }
function openCleaningRequired(){
  openModal(`<div class="sheet-head"><h2>${t('clean_required_title')}</h2><button class="closeX" onclick="closeModal()">\u2715</button></div>
    <div class="sheet-body"><div class="clean-status bad"><div class="ci">${I.warn}</div>
      <div><div class="ct">${t('clean_status_bad')}</div><div class="cs">${t('clean_required_text')}</div></div></div></div>
    <div class="sheet-foot"><button class="btn btn-ghost" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-green btn-block" onclick="closeModal();setView('cleaning')">${I.check}${t('clean_go')}</button></div>`);
}

/* ============ seed + migrate ============ */
function seed(){
  const I0=[
    ['shea','g',500,100,4],['jojoba','ml',250,50,6],['emulwax','g',200,50,5],
    ['water','ml',1000,200,0.2],['vite','csepp',100,20,2],['lavender','csepp',80,20,8],
  ];
  state.ingredients=I0.map(a=>({id:uid(),seedKey:a[0],name:SEED_TEXT.hu.ing[a[0]],unit:a[1],stock:a[2],minStock:a[3],price:a[4],expiry:'',notes:''}));
  const id=key=>state.ingredients.find(g=>g.seedKey===key).id;
  state.recipes=[{ id:uid(), seedKey:'lavcream', name:SEED_TEXT.hu.rec.lavcream.name, yield:'100 ml',
    description:SEED_TEXT.hu.rec.lavcream.desc, steps:[],
    items:[
      {ingredientId:id('water'),amount:60},{ingredientId:id('shea'),amount:15},
      {ingredientId:id('jojoba'),amount:15},{ingredientId:id('emulwax'),amount:6},
      {ingredientId:id('vite'),amount:4},{ingredientId:id('lavender'),amount:6},
    ]}];
  state.batches=[];
}
/* upgrade older stored example data so it becomes translatable */
function migrate(){
  const map={'Sheavaj':'shea','Jojoba olaj':'jojoba','Emulgeáló viasz':'emulwax','Desztillált víz':'water','E-vitamin':'vite','Levendula illóolaj':'lavender'};
  let changed=false;
  (state.ingredients||[]).forEach(g=>{ if(!g.seedKey && map[g.name]){ g.seedKey=map[g.name]; changed=true; } });
  (state.recipes||[]).forEach(r=>{ if(!r.seedKey && r.name==='Hidratáló levendula arckrém'){ r.seedKey='lavcream'; r.steps=[]; changed=true; } });
  return changed;
}

/* ============ boot ============ */
(async function boot(){
  if('serviceWorker' in navigator){ window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
  cacheLoad(); lang = state.lang||'hu'; state.lang=lang;
  applyAuthChrome();
  try{
    const { data:{ session } } = await sb.auth.getSession();
    if(session){ authed=true; userEmail=(session.user&&session.user.email)||''; await startApp(); } else { showAuth(); }
  }catch(e){ showAuth(); }
  sb.auth.onAuthStateChange((_evt, sess)=>{
    if(sess && !authed){ authed=true; userEmail=(sess.user&&sess.user.email)||''; startApp(); }
    else if(!sess && authed){ authed=false; state.ingredients=[]; state.recipes=[]; state.batches=[]; showAuth(); }
  });
  window.addEventListener('online', ()=>{ setOffline(false); scheduleReconcile(); });
  window.addEventListener('offline', ()=>setOffline(true));
})();
</script>
